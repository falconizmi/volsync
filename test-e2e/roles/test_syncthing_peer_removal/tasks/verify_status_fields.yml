---
# This set of tasks verifies that the peer status fields reported by VolSync
# contain the expected information: ID, Address, and Connected.
# This ensures VolSync is correctly populating status from the Syncthing API.

- name: Check for required variables
  fail: msg="Variable {{ item }} must be defined to use this role"
  when: vars[var_check] is undefined
  with_items:
    - instances
  loop_control:
    loop_var: var_check

- name: Ensure 2 Syncthings have been specified
  fail: msg="Exactly 2 Syncthing instances must be specified"
  when: instances | length != 2

- name: Get info about first syncthing
  kubernetes.core.k8s_info:
    api_version: volsync.backube/v1alpha1
    kind: ReplicationSource
    name: "{{ instances[0].Name }}"
    namespace: "{{ instances[0].Namespace }}"
  register: first

- name: Get info about second syncthing
  kubernetes.core.k8s_info:
    api_version: volsync.backube/v1alpha1
    kind: ReplicationSource
    name: "{{ instances[1].Name }}"
    namespace: "{{ instances[1].Namespace }}"
  register: second

- name: "Verify {{ first.resources[0].metadata.name }} has peer {{ second.resources[0].metadata.name }} with correct fields"
  assert:
    that:
      - peer_entry | length == 1
      - peer_entry[0].ID == second.resources[0].status.syncthing.ID
      - peer_entry[0].connected == true
      - peer_entry[0].address is defined
      - peer_entry[0].address | length > 0
    fail_msg: >
      Peer status incomplete for {{ second.resources[0].metadata.name }}
      on {{ first.resources[0].metadata.name }}: {{ peer_entry }}
  vars:
    peer_entry: "{{ first.resources[0].status.syncthing.peers | selectattr('ID', 'equalto', second.resources[0].status.syncthing.ID) | list }}"

- name: "Verify {{ second.resources[0].metadata.name }} has peer {{ first.resources[0].metadata.name }} with correct fields"
  assert:
    that:
      - peer_entry | length == 1
      - peer_entry[0].ID == first.resources[0].status.syncthing.ID
      - peer_entry[0].connected == true
      - peer_entry[0].address is defined
      - peer_entry[0].address | length > 0
    fail_msg: >
      Peer status incomplete for {{ first.resources[0].metadata.name }}
      on {{ second.resources[0].metadata.name }}: {{ peer_entry }}
  vars:
    peer_entry: "{{ second.resources[0].status.syncthing.peers | selectattr('ID', 'equalto', first.resources[0].status.syncthing.ID) | list }}"
